name: las-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10  # Matches your original setup
  - laspy=2.5.4  # Used in voxel_downsampling, classify_points, segment_planes
  - numpy=1.26.4  # Used across all scripts
  - open3d=0.19.0  # Used in voxel_downsampling, classify_points, segment_planes, classify_planes
  - scikit-learn=1.7.0  # Used in voxel_downsampling, classify_points for KDTree and DBSCAN
  - progress=1.6.1  # Used in voxel_downsampling, classify_points, segment_planes
  - pip  # To allow pip installation if needed
  - pdal  # Used in classify_points for point cloud processing
  - pyproj  # Used in laspy for CRS parsing (assumed needed based on prior context)
  - shapely  # Used in segment_planes for geometry operations
  - matplotlib  # Used in classify_points, segment_planes for plotting
  - scipy  # Used in classify_points for cKDTree
  - trimesh
  - pytorch::pytorch=2.2.2  # Required for Open3D-ML
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.1  # CUDA support for PyTorch (use cpuonly if no GPU)
  - pip:
      - alphashape==1.3.1
      - click-log==0.4.0
      - osmnx==2.0.7
      - pdal-plugins==1.6.6
      - rtree==1.4.1
      - trimesh==4.11.1
      - tensorboard  # Required for Open3D-ML training/visualization
      - cloth-simulation-filter  # CSF for ground removal
      # Note: Open3D-ML should be installed from source
      # Clone: git clone https://github.com/isl-org/Open3D-ML.git
      # Install: cd Open3D-ML && pip install -e .
